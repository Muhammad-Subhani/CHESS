  <style>
    *{
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    .container{
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
       flex-direction: column;
      align-items: center;
     background: radial-gradient(ellipse at center, #1a2740 0%, #0f1925 50%, #070d18 100%);

    }
    .grid{
height: 70%;
    width: 40%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
    box-sizing: border-box;
    padding: 1%;
    padding-bottom: 2%;
    background-color: #212e42;
    border-radius: 2%;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
    }
    .box{
      border: 1px solid black;
      height: 120%;
      width: 100%;
      display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    /* border-radius: 10px; */

    }
    .w{
        /* background-color: #bd82e1; */
         background-color: #cfc4b4;
    }
    .b{
     /* background-color: #4821ad; */
    background-color: #2e3a4e;
    }
    img{
width: 50%;
    height: 50%;
    object-fit: contain;
    box-sizing: border-box;
    padding: 3px;
    }
    .culprit {
      background-color: black;
    }
    .unclickable {
      pointer-events: none;
      cursor: none;
    }
    .unclick_Check {
      pointer-events: none;
      cursor: none;
    }
    .canwork {
      pointer-events: all;
    }
    .check {
      background-color: red;
    }
    
/* background: linear-gradient(to right, #403cff, #47f4f9); */
.activated {
    background-color: #f6f669 !important;
    box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5),
                inset 4px 4px 8px rgba(0, 0, 0, 0.3),
                inset -4px -4px 8px rgba(255, 255, 255, 0.15);
}

.turn-bar {
    /* width: min(100%, 1000px); */
    width: 45vw;
    height: 7vh;
    background: #1e293b;
    border-radius: 16px;
    display: flex;
    align-items: center;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
    position: relative;
    bottom: -5%;
}

.player {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12%;
    padding: 2%;
    min-width: 0;
}

.player.left{
    justify-content:flex-start;
}

.player.right{
    justify-content:flex-end;
    text-align:right;
}

.avatar {
    width: 4vw;
    height: 5vh;
    border-radius: 5%;
    background: #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
}
.white_side{
  background-image: url(./asset2/Wq.png);
}
.black_side{
  background-image: url(./asset2/Bq.png);
}
.player-info{
    min-width:0;
}

.player-name{
    color:white;
    font-weight:700;
    font-size:5rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.player-rating{
    color:#cbd5e1;
    font-size:.85rem;
}

.center-turn {
    flex: 1.3;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6%;
    border-radius: 2%;
    padding: 1%;
    background: rgba(255, 255, 255, 0.04);
}

.turn-indicator {
    width: 4%;
    /* height: 22%; */
    height: 1.3vh;
    border-radius: 57%;
    background: #fbbf24;
    box-shadow: 0 0 10px #fbbf24;
}

.turn-text {
    color: white;
    font-size: clamp(1rem, 2vw, 7rem);
    font-weight: 700;
}

@media (max-width:1200px){

.player-name{
    color:white;
    font-weight:200;
    font-size:1rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.player-rating{
    color:#cbd5e1;
    font-size:.43rem;
}
.turn-indicator {
    width: 4%;
    /* height: 22%; */
    height: 0.8vh;
    border-radius: 57%;
    background: #fbbf24;
    box-shadow: 0 0 10px #fbbf24;
}
}
