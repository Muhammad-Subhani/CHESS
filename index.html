<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    .container{
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
       flex-direction: column;
  /* background: linear-gradient(to top, #4a00e0, #8e2de2); */
    background: linear-gradient(to top, #2f0743, #41295a);
      align-items: center;
      /* background-image: url("./asset2/dark.jpg");
      background-position: center center ;
      background-repeat: no-repeat;
      background-size: cover; */
      
    }
    .grid{
      height: 70%;
      width: 40%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr ;
      box-sizing: border-box;
    }
    .box{
      border: 1px solid black;
      height: 120%;
      width: 100%;
      display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    /* border-radius: 10px; */

    }
    .w{
        background-color: #bd82e1;
    }
    .b{
     background-color: #4821ad;
    }
    img{
width: 50%;
    height: 50%;
    object-fit: contain;
    box-sizing: border-box;
    padding: 3px;
    }
    .culprit {
      background-color: black;
    }
    .unclickable {
      pointer-events: none;
      cursor: none;
    }
    .unclick_Check {
      pointer-events: none;
      cursor: none;
    }
    .canwork {
      pointer-events: all;
    }
    .check {
      background-color: red;
    }
    .activated {
      background: #0fd850;
  background: linear-gradient(
    to right,
    #0fd850,#f9f047
  );
    }
    .hide {
      opacity: 0;
    }
    #black {
   position: relative;
    top: -7%;
    color: #9122ff;
    /* font-size: clamp(1.5rem, 4vw, 8.5rem); */
    /* font-size: 166px; */
    font-size: 4vh;
    font-weight: 800;
    transform: rotate(180deg);
    }
    #white {
    position: relative;
    bottom: -7%;
    color: white;
    /* font-size: clamp(1.5rem, 4vw, 8.5rem); */
    /* font-size: 166px; */
    font-size: 4vh;
    font-weight: 800;
    text-shadow: -1px -1px 0 black,
    1px -1px 0 black , 
    1px 1px 0 black;
    }
    .available {
        background: #22E1FF;
  background: linear-gradient(
    to right,
    #22E1FF,#1D8FE1,#625EB1
  );
    }
    .underattack {
        background: #f77062;
  background: linear-gradient(
    to right,
    #f77062,#fe5196
  );
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="black">Black's Turn</h1>
    <div class="grid">
      <!-- Row 0 -->
<div class="box w" id="b-0-0"></div>
